name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing SemVer release tag to publish or repair (for example v1.0.0 or v1.0.0-test.1)
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  CI: "true"
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  DATABASE_URL: postgresql://keyzori:keyzori-release-password@127.0.0.1:5432/keyzori
  REDIS_URL: redis://127.0.0.1:6379
  ADMIN_API_KEY: release-only-admin-key-that-is-at-least-32-characters

jobs:
  release:
    name: Verify and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: keyzori
          POSTGRES_USER: keyzori
          POSTGRES_PASSWORD: keyzori-release-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U keyzori -d keyzori"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Verify release source and credentials
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          test -n "${NPM_TOKEN}" || { echo "NPM_TOKEN is not configured." >&2; exit 1; }
          git check-ref-format "refs/tags/${RELEASE_TAG}" >/dev/null
          tag_commit=$(git rev-list --max-count=1 "refs/tags/${RELEASE_TAG}")
          test -n "${tag_commit}" || { echo "Release tag ${RELEASE_TAG} was not found." >&2; exit 1; }
          git merge-base --is-ancestor "${tag_commit}" "origin/${DEFAULT_BRANCH}" || { echo "Release tag must point to the default branch." >&2; exit 1; }
          bun run release:verify -- "${RELEASE_TAG}"
      - name: Install locked dependencies
        run: bun install --frozen-lockfile
      - name: Audit high-severity dependencies
        run: bun run audit
      - name: Verify workspace
        run: bun run check
      - name: Validate migration history
        run: bun run db:check
      - name: Build distributable artifacts
        run: bun run build
      - name: Smoke-test package artifacts
        run: bun run smoke:packages
      - name: Package release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          tar --create --gzip \
            --file "release-assets/keyzori-${RELEASE_TAG}-linux-x64.tar.gz" \
            --directory apps/server/dist \
            .
          (cd apps/sdk && bun pm pack --destination ../../release-assets)
          (cd release-assets && sha256sum ./* > SHA256SUMS)
      - name: Verify live PostgreSQL and Redis flow
        run: bun run --cwd apps/server ../../tests/liveFlow.ts
        env:
          LIVE_TEST_ENABLED: "true"
      - name: Validate Compose configuration
        run: docker compose config --quiet
        env:
          POSTGRES_PASSWORD: keyzori-release-password
      - name: Build release image
        id: image
        shell: bash
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          commit_sha=$(git rev-parse HEAD)
          echo "name=${image}" >> "${GITHUB_OUTPUT}"
          echo "commit=${commit_sha}" >> "${GITHUB_OUTPUT}"
          docker build \
            --file apps/server/Dockerfile \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${commit_sha}" \
            --label "org.opencontainers.image.version=${RELEASE_TAG}" \
            --tag "${image}:${RELEASE_TAG}" \
            --tag "${image}:${commit_sha}" \
            .
      - name: Smoke-test release image
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.image.outputs.name }}:${RELEASE_TAG}"
          docker run --rm --entrypoint /app/keyzori-admin "${image}" --help >/dev/null
          container=$(docker run --detach --network host \
            --env DATABASE_URL \
            --env REDIS_URL \
            --env ADMIN_API_KEY \
            "${image}")
          cleanup() { docker rm --force "${container}" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error http://127.0.0.1:3000/ready | grep --quiet '"status":"ready"'; then
              exit 0
            fi
            if ! docker inspect --format '{{.State.Running}}' "${container}" | grep --quiet true; then
              docker logs "${container}"
              exit 1
            fi
            sleep 1
          done
          docker logs "${container}"
          echo "Container did not become ready within 60 seconds." >&2
          exit 1
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push release image tags
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.image.outputs.name }}"
          docker push "${image}:${RELEASE_TAG}"
          docker push "${image}:${{ steps.image.outputs.commit }}"
      - name: Publish SDK to npm
        shell: bash
        run: |
          set -euo pipefail
          echo "Authenticated npm user: $(bun pm whoami)"
          version="${RELEASE_TAG#v}"
          if [[ "${version}" == *-* ]]; then
            npm_tag="${version#*-}"
            npm_tag="${npm_tag%%.*}"
          else
            npm_tag="latest"
          fi
          echo "Publishing ${version} with npm dist-tag ${npm_tag}"
          (cd apps/sdk && bun publish --access public --tolerate-republish --tag "${npm_tag}")
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" release-assets/* --clobber
          else
            gh release create "${RELEASE_TAG}" release-assets/* \
              --generate-notes \
              --title "${RELEASE_TAG}" \
              --verify-tag
          fi
