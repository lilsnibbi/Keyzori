name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: "true"
  DATABASE_URL: postgresql://keyzori:keyzori-release-password@127.0.0.1:5432/keyzori
  REDIS_URL: redis://127.0.0.1:6379
  ADMIN_API_KEY: release-only-admin-key-that-is-at-least-32-characters

jobs:
  release:
    name: Verify and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: keyzori
          POSTGRES_USER: keyzori
          POSTGRES_PASSWORD: keyzori-release-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U keyzori -d keyzori"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out release tag
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.14
      - name: Verify release source and credentials
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          test -n "${NPM_TOKEN}" || { echo "NPM_TOKEN is not configured." >&2; exit 1; }
          git merge-base --is-ancestor "${GITHUB_SHA}" "origin/${DEFAULT_BRANCH}" || { echo "Release tag must point to the default branch." >&2; exit 1; }
          bun run release:verify -- "${GITHUB_REF_NAME}"
      - name: Install locked dependencies
        run: bun install --frozen-lockfile
      - name: Audit high-severity dependencies
        run: bun run audit
      - name: Verify workspace
        run: bun run check
      - name: Validate migration history
        run: bun run db:check
      - name: Build distributable artifacts
        run: bun run build
      - name: Smoke-test package artifacts
        run: bun run smoke:packages
      - name: Dry-run SDK package
        run: bun pm pack --cwd apps/sdk --dry-run
      - name: Verify live PostgreSQL and Redis flow
        run: bun run --cwd apps/server ../../tests/liveFlow.ts
        env:
          LIVE_TEST_ENABLED: "true"
      - name: Validate Compose configuration
        run: docker compose config --quiet
        env:
          POSTGRES_PASSWORD: keyzori-release-password
      - name: Build release image
        id: image
        shell: bash
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "name=${image}" >> "${GITHUB_OUTPUT}"
          docker build \
            --file apps/server/Dockerfile \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.version=${GITHUB_REF_NAME}" \
            --tag "${image}:${GITHUB_REF_NAME}" \
            .
      - name: Smoke-test release image
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.image.outputs.name }}:${GITHUB_REF_NAME}"
          docker run --rm --entrypoint /app/keyzori-admin "${image}" --help >/dev/null
          container=$(docker run --detach --network host \
            --env DATABASE_URL \
            --env REDIS_URL \
            --env ADMIN_API_KEY \
            "${image}")
          cleanup() { docker rm --force "${container}" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error http://127.0.0.1:3000/ready | grep --quiet '"status":"ready"'; then
              exit 0
            fi
            if ! docker inspect --format '{{.State.Running}}' "${container}" | grep --quiet true; then
              docker logs "${container}"
              exit 1
            fi
            sleep 1
          done
          docker logs "${container}"
          echo "Container did not become ready within 60 seconds." >&2
          exit 1
      - name: Publish SDK to npm
        run: bun run publish:packages
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push verified release image
        id: push
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.image.outputs.name }}:${GITHUB_REF_NAME}"
          docker push "${image}"
          digest=$(docker buildx imagetools inspect "${image}" --format '{{json .Manifest.Digest}}')
          digest=${digest//\"/}
          test -n "${digest}" || { echo "Published image digest was not found." >&2; exit 1; }
          echo "Published ${image}@${digest}" >> "${GITHUB_STEP_SUMMARY}"
