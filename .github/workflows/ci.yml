name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: "true"

jobs:
  verify:
    name: Verify workspace and artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: keyzori
          POSTGRES_USER: keyzori
          POSTGRES_PASSWORD: keyzori-ci-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U keyzori -d keyzori"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install locked dependencies
        run: bun install --frozen-lockfile
      - name: Audit high-severity dependencies
        run: bun run audit
      - name: Verify workspace
        run: bun run check
      - name: Validate migration history
        run: bun run db:check
      - name: Build distributable artifacts
        run: bun run build
      - name: Smoke-test package artifacts
        run: bun run smoke:packages
      - name: Dry-run SDK package
        run: bun pm pack --cwd apps/sdk --dry-run
      - name: Verify live PostgreSQL and Redis flow
        run: bun run --cwd apps/server ../../tests/liveFlow.ts
        env:
          LIVE_TEST_ENABLED: "true"
          DATABASE_URL: postgresql://keyzori:keyzori-ci-password@127.0.0.1:5432/keyzori
          REDIS_URL: redis://127.0.0.1:6379
          ADMIN_API_KEY: ci-only-admin-key-that-is-at-least-32-characters
      - name: Validate Compose configuration
        run: docker compose config --quiet
        env:
          ADMIN_API_KEY: ci-only-admin-key-that-is-at-least-32-characters
          POSTGRES_PASSWORD: keyzori-ci-password
      - name: Build server container
        run: bun run docker:build
